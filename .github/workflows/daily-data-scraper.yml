name: Daily Data Scraper

on:
  schedule:
    # Runs at 18:00 UTC (11:00 AM MST / 12:00 PM MDT) every day
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the workflow from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v2
      with:
        ruby-version: '3.0'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow

    - name: Run Scraper and Image Generator
      run: |
        ruby update_data.rb

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Scraper"
        git config --global user.email "actions@github.com"
        git add data.json og_image.png Orbitron-Bold.ttf || true
        git commit -m "Auto-update: U.S. Debt and Elon Net Worth [skip ci]" || echo "No changes to commit"
        git push origin main
