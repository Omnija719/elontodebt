name: Daily Data Scraper

on:
  schedule:
    - cron: '0 18 * * *'   # Runs at 11:00 AM MST daily
  workflow_dispatch:       # Allows manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v2
      with:
        ruby-version: '3.0'
        bundler-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow

    - name: Run Scraper and Image Generator
      run: ruby update_data.rb

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Scraper"
        git config --global user.email "actions@github.com"
        git add data.json history.json og_image.png || true
        git commit -m "Auto-update: Data + History + OG Image [skip ci]" || echo "No changes to commit"
        git push origin main || echo "Push failed or no changes"
